syntax = "proto3";

option csharp_namespace = "ECommerce.PaymentService.Api.Grpc";

package PaymentService;

service PaymentGrpcService {
  rpc InitialPayment (InitialPaymentRequest) returns (InitialPaymentResponse);
  rpc Refund (RefundRequest) returns (RefundResponse);
}

message InitialPaymentRequest {
  string orderId = 1;
  double amount = 2;
  string method = 3;
  string userPhone = 4;
  string userEmail = 5;
}

message InitialPaymentResponse {
  string url = 1;
}

message RefundRequest {
  string paymobTransactionId = 1;
  double amount = 2;
}

message RefundResponse {
  bool isSuccess = 1;
  string message = 2;
  int32 refundTransactionId = 3;
}
